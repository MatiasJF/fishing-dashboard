name: Actualizar datos del embalse

on:
  # CRON DESACTIVADO: el despliegue es en VPS, donde la captura la hace el timer de systemd
  # (deploy/fishing-fetch.timer). Dejar el cron aquí duplicaría la captura y, al commitear
  # datos al repo, chocaría con los datos locales del VPS en cada `git pull`.
  # Se conserva solo el disparo manual por si se quisiera usar el modelo Vercel/git.
  workflow_dispatch: {}

# Necesario para que el job pueda commitear data/ de vuelta al repo.
permissions:
  contents: write

# Evita solapamientos si una ejecución se retrasa.
concurrency:
  group: fetch-datos
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Obtener datos y generar snapshot
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          SAIH_ENDPOINT: ${{ secrets.SAIH_ENDPOINT }}
        run: npm run fetch

      - name: Commit y push si hay cambios en data/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "Sin cambios en data/; no se commitea."
          else
            git add data
            git commit -m "actualiza datos del embalse ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
